<!DOCTYPE html>
<html lang="my">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Content Security Policy Safeguards -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https: 'unsafe-eval' 'unsafe-inline'; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline' https:; media-src * blob:; img-src 'self' data: content: https:; font-src 'self' data: https:;" />
    
    <title>Burmese Recap Studio - Pro AI Video Narrator Suite</title>

    <!-- Mobile Integration and Web App Capabilities (PWA) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Recap Studio" />
    <meta name="theme-color" content="#059669" />
    
    <!-- Manifest & Touch Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />

    <!-- Google Fonts Preload & Import (Burmese Unicode Fallback + Premium Display Typefaces) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Global App Shell Reset Styles -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020617; /* Slate-950 matched theme */
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Make sure input fields and script areas remain text-selectable */
      input, textarea, [contenteditable="true"], .select-text {
        -webkit-user-select: text !important;
        user-select: text !important;
      }
    </style>
  </head>
  <body>
    <!-- Main React Mount Node -->
    <div id="root"></div>

    <!-- Core Module Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
