name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Native Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Create Production .env file
        run: |
          echo "VITE_GEMINI_API_KEY=\"\${{ secrets.VITE_GEMINI_API_KEY }}\"" > .env
          echo "VITE_APP_URL=\"\${{ secrets.VITE_APP_URL || 'https://ais-dev-gw5iw4avvqz4fmkrhq2mim-33484223713.asia-southeast1.run.app' }}\"" >> .env
          echo "GEMINI_API_KEY=\"\${{ secrets.GEMINI_API_KEY || secrets.VITE_GEMINI_API_KEY }}\"" >> .env

      - name: Run Web Build
        run: |
          npm run build

      - name: Check/Add Capacitor Android Platform
        run: |
          if [ ! -d "android" ]; then
            echo "Android native platform folder is missing. Instantiating via Capacitor CLI..."
            npx cap add android
          else
            echo "Android native platform folder already checked into repository."
          fi

      - name: Sync Web Assets to Native Android Project
        run: |
          npx cap sync android

      - name: Force Fix and Regenerate Gradle Wrapper
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.13

      - name: Grant Execute Permission to Gradle Wrapper
        run: |
          if [ -f "android/gradlew" ]; then
            echo "Granting execution permissions to gradlew..."
            chmod +x android/gradlew
          else
            echo "gradlew not found!"
            exit 1
          fi

      - name: Build Debug Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
