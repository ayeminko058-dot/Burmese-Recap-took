name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Native Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Web Build
        run: |
          npm run build

      - name: Check/Add Capacitor Android Platform
        run: |
          if [ ! -d "android" ]; then
            echo "Android native platform folder is missing. Instantiating via Capacitor CLI..."
            npx cap add android
          else
            echo "Android native platform folder already checked into repository."
          fi

      - name: Sync Web Assets to Native Android Project
        run: |
          npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper
        run: |
          if [ -f "android/gradlew" ]; then
            echo "Granting execution permissions to gradlew..."
            chmod +x android/gradlew
          else
            echo "gradlew not found!"
            exit 1
          fi

      - name: Build Debug Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
