name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🌟 အမှားကင်းအောင် ပုံစံပြောင်းပြီး .env ဖိုင် ဆောက်ခိုင်းခြင်း 🌟
      - name: Create Environment File
        run: |
          echo "VITE_APP_URL=https://my-edge-tts-api.vercel.app" > .env
          echo "APP_URL=https://my-edge-tts-api.vercel.app" >> .env
          echo "GEMINI_API_KEY=user_will_provide_it" >> .env

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Assets & Sync Capacitor Android
        run: |
          npm run build
          npx cap add android || true
          npx cap sync android

      - name: Wipe Corrupt Wrapper Jar
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Inject Genuine Whisper Model Asset
        run: |
          mkdir -p android/app/src/main/assets/
          rm -f android/app/src/main/assets/whisper-tiny.bin
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin" -o android/app/src/main/assets/whisper-tiny.bin

      - name: Setup Dynamic Gradle Tooling (Clean Installation)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9
          generate-job-summary: false

      - name: Compile Native Debug APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
