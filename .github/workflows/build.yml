name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Native Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Create Production .env file
        run: |
          echo "VITE_GEMINI_API_KEY=\"\${{ secrets.VITE_GEMINI_API_KEY }}\"" > .env
          echo "VITE_APP_URL=\"\${{ secrets.VITE_APP_URL || 'https://ais-dev-gw5iw4avvqz4fmkrhq2mim-33484223713.asia-southeast1.run.app' }}\"" >> .env
          echo "GEMINI_API_KEY=\"\${{ secrets.GEMINI_API_KEY || secrets.VITE_GEMINI_API_KEY }}\"" >> .env

      - name: Build Web Assets for Capacitor
        run: |
          npm run build

      - name: Check/Add Capacitor Android Platform
        run: |
          if [ ! -d "android" ]; then
            echo "Android native platform folder is missing. Instantiating via Capacitor CLI..."
            npx cap add android
          else
            echo "Android native platform folder already checked into repository."
          fi

      - name: Sync Web Assets to Native Android Project
        run: |
          npx cap sync android

      - name: Setup Gradle Cache and Tooling
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          validate-wrappers: false

      - name: Pre-build Permissions & Secure Execution
        run: |
          chmod +x android/gradlew || chmod +x gradlew

      - name: Build Debug Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
