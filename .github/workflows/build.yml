name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Assets & Sync Capacitor Android
        run: |
          npm run build
          npx cap add android || true
          npx cap sync android

      - name: Wipe Corrupt Wrapper Jar
        run: |
          # Completely remove the corrupt jar file from the workplace environment before setup
          rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Dynamic Gradle Tooling (Clean Installation)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          generate-job-summary: false

      - name: Compile Native Debug APK
        run: |
          cd android
          # Regenerate proper executable attributes
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew || true
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
