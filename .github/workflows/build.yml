name: Build Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Web App and Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Download Whisper Model for Subtitle Aligner Module
        run: |
          # Isolate model downloading specifically for Subtitle Aligner Forced Alignment Engine
          wget -q https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin
          mkdir -p assets/models
          cp ggml-tiny.bin assets/models/

      - name: Compile Application
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-app-package
          path: |
            .next/
            dist/
            build/
            assets/models/ggml-tiny.bin
            dist/assets/models/ggml-tiny.bin

