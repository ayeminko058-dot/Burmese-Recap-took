name: Generate Android APK/AAB via Bubblewrap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bubblewrap-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create Keystore for Signing
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias androidkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass androidpassword \
            -keypass androidpassword \
            -dname "CN=MyanmarSol, OU=Development, O=BurmeseRecapStudio, L=Yangon, S=Yangon, C=MM"

      - name: Bubblewrap Build (APK and AAB Generation)
        run: |
          # Use non-interactive bubblewrap command execution
          yes | bubblewrap doctor || true
          
          # Build using the created keystore and configured twa-manifest.json
          bubblewrap build --signingKeyPath="./android.keystore" --signingKeyAlias="androidkey" --signingKeyPassword="androidpassword" --storePassword="androidpassword"

      - name: Upload Signing Fingerprints & APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ./*.apk

      - name: Upload Signing Fingerprints & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ./*.aab
