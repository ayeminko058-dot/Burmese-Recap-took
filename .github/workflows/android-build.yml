name: Mobile Link to APK Cloud Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Scaffold Native Bridge Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob --legacy-peer-deps
        
    - name: Configure Capacitor with Live Render URL
      run: |
        cat <<EOF> capacitor.config.ts
        import { CapacitorConfig } from '@capacitor/cli';
        const config: CapacitorConfig = {
          appId: 'com.burmeserecap.studio',
          appName: 'Burmese Recap Studio',
          webDir: 'www',
          server: {
            url: 'https://burmese-recap-took.onrender.com/',
            cleartext: true,
            allowNavigation: ['burmese-recap-took.onrender.com', '*.onrender.com']
          },
          plugins: {
            AdMob: {
              initializeOnIdfa: true
            }
          }
        };
        export default config;
        EOF
        mkdir www
        echo "<html><head><script>window.location.href='https://burmese-recap-took.onrender.com/';</script></head><body>Loading Burmese Recap Studio...</body></html>" > www/index.html

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Native Android Project
      run: |
        npx cap add android
        npx cap sync android

    - name: Fix Android Network Security & Permissions
      run: |
        # Inject network security to allow Render API traffic and prevent the AI endpoints from freezing
        sed -i '/<\/application>/i \    <uses-library android:name="org.apache.http.legacy" android:required="false" />' android/app/src/main/AndroidManifest.xml
        chmod +x android/gradlew

    - name: Build Production APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace

    - name: Upload Finished Live Link APK
      uses: actions/upload-artifact@v4
      with:
        name: app-live-link-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
